[project]
name = "sigmahqrag"
version = "2026.02.27"
readme = "README.md"
license = "MIT"
dependencies = [
    "asyncio>=4.0.0",
    "chromadb>=1.5.1",
    "docx>=0.2.4",
    "fastapi>=0.133.1",
    "gitpython>=3.1.46",
    "markdown>=3.10.2",
    "nicegui>=3.8.0",
    "ollama>=0.6.1",
    "pdf2image>=1.17.0",
    "pillow>=12.1.1",
    "python-multipart>=0.0.22",
    "uvicorn>=0.41.0",
]
requires-python = ">=3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "black>=26.1.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
]
