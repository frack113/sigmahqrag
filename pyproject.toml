[project]
name = "sigmahqrag"
version = "2026.02.27"
readme = "README.md"
license = "MIT"
dependencies = [
    "docx>=0.2.4",
    "easyocr>=1.7.2",
    "gitpython>=3.1.46",
    "langchain>=1.2.10",
    "langchain-community>=0.4.1",
    "langchain-openai>=1.1.10",
    "langchain-ollama>=1.0.1",
    "langchain-chroma>=1.1.0",
    "markdown>=3.10.2",
    "nicegui>=3.8.0",
    "pdf2image>=1.17.0",
    "pillow>=12.1.1",
    "pypdf>=6.7.5",
]
requires-python = ">=3.10"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "black>=26.1.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "mypy>=1.19.1",
    "ruff>=0.15.4",
    "pyflakes>=3.4.0",
]

[tool.black]
line-length = 88
target-version = ['py312']
